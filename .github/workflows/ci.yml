name: CI

on:
  pull_request:
    branches: [development, staging, production]
  push:
    branches: [development, staging, production, main]

env:
  DATABASE_URL: "file:./dev.db"
  NEXTAUTH_SECRET: "ci-secret-placeholder"
  NEXTAUTH_URL: "http://localhost:3000"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test
        continue-on-error: true  # eliminar cuando los tests estén implementados (TASK-1008)

      - name: Build
        run: bun run build
