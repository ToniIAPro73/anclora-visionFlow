name: Promote development to staging

on:
  workflow_dispatch:

env:
  DATABASE_URL: "file:./dev.db"
  NEXTAUTH_SECRET: "ci-secret-placeholder"
  NEXTAUTH_URL: "http://localhost:3000"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Checkout staging
        run: git checkout staging

      - name: Merge development
        run: git merge --no-ff origin/development -m "chore: merge development to staging [ci-skip]"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test
        continue-on-error: true  # eliminar cuando los tests estén implementados (TASK-1008)

      - name: Build
        run: bun run build

      - name: Push staging
        if: success()
        run: git push origin staging

      - name: Notify
        if: success()
        run: echo "✓ Successfully promoted development to staging"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Promotion failed"
          echo "Merge may have conflicts. Resolve manually."
        continue-on-error: true
