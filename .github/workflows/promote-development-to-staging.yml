name: Promote development to staging

on:
  workflow_dispatch:

env:
  NEXTAUTH_SECRET: "ci-secret-placeholder"
  NEXTAUTH_URL: "http://localhost:3000"
  OPENROUTER_API_KEY: "ci-placeholder-not-used"

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: visionflow_ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: visionflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://visionflow_ci:ci_password@localhost:5432/visionflow_test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply migrations
        run: bunx prisma migrate deploy

      - name: Checkout staging
        run: git checkout staging

      - name: Merge development
        run: |
          git merge --no-ff origin/development -m "chore: merge development to staging [ci-skip]"

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Push staging
        if: success()
        run: git push origin staging

      - name: Notify
        if: success()
        run: echo "✓ Successfully promoted development to staging"

      - name: Notify failure
        if: failure()
        run: |
          echo "✗ Promotion failed"
          echo "Merge may have conflicts. Resolve manually."
        continue-on-error: true
